name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos
            dist_cmd: npm run dist:mac
          - os: windows-latest
            artifact: windows
            dist_cmd: npm run dist:win
    defaults:
      run:
        working-directory: desktop/electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Check release config
        run: npm run check

      - name: Build desktop artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: ${{ matrix.dist_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-translator-${{ matrix.artifact }}
          path: |
            desktop/electron/dist/*.dmg
            desktop/electron/dist/*.zip
            desktop/electron/dist/*.exe
            desktop/electron/dist/*.blockmap
            desktop/electron/dist/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-artifacts/* --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --generate-notes
