name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos-universal
            dist_cmd: npm run dist:mac:universal
          - os: windows-latest
            artifact: windows
            dist_cmd: npm run dist:win
    defaults:
      run:
        working-directory: desktop/electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Check release config
        run: npm run check

      - name: Build macOS desktop artifact
        if: matrix.artifact == 'macos-universal'
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ matrix.dist_cmd }}

      - name: Build Windows desktop artifact
        if: matrix.artifact == 'windows'
        env:
          GH_TOKEN: ${{ github.token }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: ${{ matrix.dist_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-translator-${{ matrix.artifact }}
          path: |
            desktop/electron/dist/*.dmg
            desktop/electron/dist/*.zip
            desktop/electron/dist/*.exe
            desktop/electron/dist/*.blockmap
            desktop/electron/dist/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release-artifacts/* --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --generate-notes
          fi
